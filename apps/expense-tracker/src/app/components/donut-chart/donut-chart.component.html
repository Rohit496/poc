<div class="donut-chart-wrapper">
  <svg
    class="donut-chart"
    viewBox="0 0 200 200"
    preserveAspectRatio="xMidYMid meet"
    data-testid="donut-chart"
  >
    @for (slice of slices; track slice.category) {
      <path
        [attr.d]="slice.path"
        [attr.fill]="slice.color"
        [attr.data-testid]="'slice-' + slice.category"
        class="donut-slice"
        (mouseenter)="onSliceEnter(slice)"
        (mouseleave)="onSliceLeave()"
      />
    }
  </svg>

  @if (activeSlice) {
    <div class="chart-tooltip" data-testid="chart-tooltip">
      <span class="tooltip-category" data-testid="tooltip-category">{{ activeSlice.category }}</span>
      <span class="tooltip-amount" data-testid="tooltip-amount">${{ activeSlice.amount | number: '1.2-2' }}</span>
      <span class="tooltip-percentage" data-testid="tooltip-percentage">{{ activeSlice.percentage }}%</span>
    </div>
  }
</div>
